<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Membership Registration</title>

    <!-- CSS -->
    <link rel="stylesheet" href="contacts.style.css">
</head>
<body>

    
    <!-- Header -->
    <header class="header">   
        <div class="logo">GTTI<span>LIBRARY</span></div>
        
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome To GTTI  Library</h1>
    </section>
    <section class="nav1">
        <nav>
            <ul>
                <li><a href="">Books</a></li>
                <li><a href="contacts.details.html">Contact</a></li>
                <li><a href="personal  details.html">Form</a></li>
            </ul>
        </nav>
    </section>
<form id="membershipForm">

    <label>Email</label>
    <input type="email" id="email">
    <small class="error" id="emailError"></small>

    <label>Phone</label>
    <input type="text" id="phone">
    <small class="error" id="phoneError"></small>

    <label>Password</label>
    <input type="password" id="password">
    <small class="error" id="passwordError"></small>

    <label>Category</label>
    <select id="category">
        <option value="">Select category</option>
        <option>Student</option>
        <option>Teacher</option>
    </select>
    <small class="error" id="categoryError"></small>

    <label>Duration</label>
    <select id="duration">
        <option value="">Select duration</option>
        <option>1 Month</option>
        <option>6 Months</option>
    </select>
    <small class="error" id="durationError"></small>

    <button type="submit">Registration</button>
</form>


<!-- JS -->
<script src="d:\all project & Task\library\contacts.js"></script>
</body>
</html>
